<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Resume Tailor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" th:href="@{/favicon.png}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-brand">Resume Tailor</a>
    <div class="topbar-actions">
      <a href="/register" class="btn-nav-primary">Create account</a>
    </div>
  </div>
</nav>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="auth-wrapper">
  <div class="card" style="max-width:420px; width:100%;">

    <h2 style="font-family:'Syne',sans-serif; font-weight:700; font-size:22px; margin-bottom:6px;">Welcome back</h2>
    <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px; text-transform:none; letter-spacing:0; font-family:'DM Sans',sans-serif;">Sign in to continue</p>

    <div th:if="${param.error}" class="alert alert-error">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Invalid email or password
    </div>

    <form th:action="@{/login}" method="post">

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="field" style="margin-top:16px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-submit" style="margin-top:24px;">
        Sign in
      </button>

    </form>

    <div class="divider">or</div>

    <a href="/oauth2/authorization/google" class="btn-oauth">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>

    <p style="text-align:center; font-size:13px; color:var(--text-muted); margin-top:20px; font-family:'DM Sans',sans-serif; text-transform:none; letter-spacing:0;">
      Don't have an account? <a href="/register" style="color:var(--accent); text-decoration:none;">Sign up</a>
    </p>

  </div>
</div>

</body>
</html>
